<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selector */
        div {
            /* background-color: red; */
        }

        /* Class Selector */
        .red {
            background-color: red;
        }

        /* Id Selector */
        #green {
            background-color: green;
        }

        /* Child Selector */
        div>p {
            color: blue;
            background-color: brown;
        }

        /* Descendant Selector */
        div p {
            color: blue;
            background-color: brown;
            /* Universal Selector */

            margin: 0;
            padding: 0;
        }

        /* Pseudo Selector */
        a:visited {
            color: red;
        }

        a:link {
            color: red;
        }

        a:active {
            background-color: purple;
        }

        a:hover {
            background-color: gold;
        }
    </style>
</head>

<body>
    <div class="red">I am a div
        <article>
            <p>I am a Para inside div
        </article>
        </p>
    </div>
    <div id="green">I am another div
    </div>
    <h2>
    <ul>
        <li><a href="http://www.google.com">Go to Google</a></li>
    </ul>
    <ul>
        <li><a href="http://www.Facebook.com">Go to Facebook</a></li>
    </ul>
    </h2>
</body>

</html>
